<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Witch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-theme="light">
    <!-- Sidebar -->
    <aside class="sidebar">
      <!-- Brand -->
      <section class="brand">
        <h1 class="logo">Web Witch</h1>
        <span>thewebwitchproject.com</span>
      </section>
      <!-- Theme Toggle -->
      <section class="new-features">
        <h2 class="new-features-title">New Features</h2>
        <button class="theme-toggle" type="button">TRY IN DARK MODE!</button>
      </section>
      <!-- Advertisement Carousel -->
      <section class="advertisements">
        <main class="advertisement">
          <header class="ad-header">
            <div class="ad-svg"></div>
            <h2 class="ad-title"></h2>
            <div class="ad-svg"></div>
          </header>
          <p class="ad-description"></p>
          <button class="ad-cta" type="button"></button>
        </main>
        <footer class="ads-footer">
          <button class="ads-nav prev" type="button"></button>
          <button class="ads-nav next" type="button"></button>
        </footer>
      </section>
      <!-- Quick Links -->
      <section class="quick-links">
        <ul class="links">
          <li class="link">
            <a
              href="https://github.com/thewebwitch"
              id="github-link"
              target="_blank"
              >GitHub</a
            >
          </li>
          <li class="link">
            <a
              href="https://www.linkedin.com/in/meghan-leicht/"
              id="linkedin-link"
              target="_blank"
              >LinkedIn</a
            >
          </li>
          <li class="link">
            <a href="#" id="resume-link">Resume</a>
          </li>
        </ul>
      </section>
    </aside>
    <!-- Main Content -->
    <div class="main-wrapper">
      <header class="header">Something interactive</header>
      <main class="main">
        <div class="tabs">
          <button class="tab" data-tab="home" type="button">Home</button>
          <button class="tab" data-tab="about" type="button">About</button>
          <button class="tab" data-tab="projects" type="button">
            Projects
          </button>
          <button class="tab" data-tab="contact" type="button">Contact</button>
        </div>
        <div class="tab-panel"></div>
      </main>
    </div>
    <script type="module" src="script.js"></script>
  </body>
</html>
