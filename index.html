<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Witch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-theme="light">
    <!-- Sidebar -->
    <aside class="sidebar">
      <!-- Brand -->
      <section class="brand">
        <h1 class="logo">Web Witch</h1>
        <span>thewebwitchproject.com</span>
      </section>
      <!-- Theme Toggle -->
      <section class="new-features">
        <h2 class="new-features-title">New Features</h2>
        <button class="theme-toggle" type="button">TRY IN DARK MODE!</button>
      </section>
      <!-- Advertisement Carousel -->
      <section class="advertisements">
        <article class="advertisement">
          <h2 class="ad-title"></h2>
          <p class="ad-description"></p>
          <button class="ad-cta" type="button"></button>
        </article>
        <footer class="ads-footer">
          <button
            class="ads-nav prev"
            type="button"
            aria-label="previous ad"
          ></button>
          <button
            class="ads-nav next"
            type="button"
            aria-label="next ad"
          ></button>
        </footer>
      </section>
      <!-- External Links -->
      <nav class="external-links" aria-label="external links">
        <ul class="links">
          <li class="link">
            <a
              href="https://github.com/thewebwitch"
              id="github-link"
              target="_blank"
              >GitHub
            </a>
          </li>
          <li class="link">
            <a
              href="https://www.linkedin.com/in/meghan-leicht/"
              id="linkedin-link"
              target="_blank"
              >LinkedIn
            </a>
          </li>
          <li class="link">
            <a href="#" id="resume-link">Resume </a>
          </li>
        </ul>
      </nav>
    </aside>
    <!-- Main Content -->
    <main class="main-wrapper">
      <header class="header">Something interactive</header>
      <section class="main">
        <nav class="tabs" aria-label="main tabs">
          <button class="tab" data-tab="home" type="button">Home</button>
          <button class="tab" data-tab="about" type="button">About</button>
          <button class="tab" data-tab="projects" type="button">
            Projects
          </button>
          <button class="tab" data-tab="contact" type="button">Contact</button>
        </nav>
        <div class="tab-panel"></div>
        <!-- Tab templates for each tab -->
        <!-- HOME TEMPLATE -->
        <template id="tab-home">
          <div class="tab-content home-content">
            <h2>Welcome to Web Witch</h2>
            <p>Your interactive web development portfolio</p>
          </div>
        </template>
        <!-- ABOUT TEMPLATE -->
        <template id="tab-about">
          <div class="tab-content about-content">
            <h2>About Me</h2>
            <div class="about-grid">
              <div class="about-text">
                <p>
                  I'm a passionate web developer who loves creating interactive
                  experiences...
                </p>
                <ul class="skills-list">
                  <li>JavaScript</li>
                  <li>React</li>
                  <li>Node.js</li>
                </ul>
              </div>
            </div>
          </div>
        </template>
        <!-- PROJECTS TEMPLATE -->
        <template id="tab-projects">
          <div class="tab-content projects-content">
            <h2>My Projects</h2>
            <div class="projects-grid">
              <div class="project-card">
                <h3>Project 1</h3>
                <p>Description of project 1</p>
                <a href="#" class="project-link">View Project</a>
              </div>
              <div class="project-card">
                <h3>Project 2</h3>
                <p>Description of project 2</p>
                <a href="#" class="project-link">View Project</a>
              </div>
            </div>
          </div>
        </template>
        <!-- CONTACT TEMPLATE -->
        <template id="tab-contact">
          <article id="contact-tab" class="tab-content">
            <form name="contact" method="POST" data-netlify="true">
              <p>
                <label>Your Name: <input type="text" name="name" /></label>
              </p>
              <p>
                <label>Your Email: <input type="email" name="email" /></label>
              </p>
              <p>
                <label>
                  Your Role:
                  <select name="role[]" multiple>
                    <option value="leader">Leader</option>
                    <option value="follower">Follower</option>
                  </select>
                </label>
              </p>
              <p>
                <label>Message: <textarea name="message"></textarea></label>
              </p>
              <p>
                <button type="submit">Send</button>
              </p>
            </form>
          </article>
        </template>
      </section>
    </main>
    <script type="module" src="script.js"></script>
  </body>
</html>
