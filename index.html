<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Witch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <section class="brand">
        <h1 class="logo">Web Witch</h1>
        <span>thewebwitchproject.com</span>
      </section>
      <section class="new-features">
        <h2 class="section-title">New Features</h2>
        <button class="theme-toggle">
          <img src="assets/SparklesLeft.svg" alt="" width="20" height="20" />
          TRY IN DARK MODE!
          <img src="assets/SparklesRight.svg" alt="" width="20" height="20" />
        </button>
      </section>
      <!-- Advertisement Carousel -->
      <section class="advertisements">
        <main class="advertisement">
          <header class="ad-header">
            <img class="ad-svg" src="" alt="Ad Image" width="20" height="20" />
            <h2 class="ad-title"></h2>
            <img class="ad-svg" src="" alt="Ad Image" width="20" height="20" />
          </header>
          <p class="ad-description"></p>
          <button class="ad-cta"></button>
        </main>
        <footer class="ads-footer">
          <button class="ads-nav prev">
            <img
              src="assets/ArrowAltCircleLeft.svg"
              alt=""
              width="20"
              height="20"
            />
          </button>
          <button class="ads-nav next">
            <img
              src="assets/ArrowAltCircleRight.svg"
              alt=""
              width="20"
              height="20"
            />
          </button>
        </footer>
      </section>
      <section class="quick-links">
        <h2 class="section-title">Quick Links</h2>
      </section>
    </aside>
    <!-- Main Content -->
    <div class="main-wrapper">
      <header class="header">Something interactive</header>
      <main class="main">
        <div class="tabs">
          <button class="tab" data-tab="home">Home</button>
          <button class="tab" data-tab="about">About</button>
          <button class="tab" data-tab="projects">Projects</button>
          <button class="tab" data-tab="contact">Contact</button>
        </div>
        <div class="tab-panel"></div>
      </main>
    </div>
    <script type="module" src="script.js"></script>
  </body>
</html>
